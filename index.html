<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magical Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Pinyon_Script&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. RESET & BASE LAYOUT
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0b0a;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: #fdfaf2;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #ebdcb9;
        }

        /* ==========================================================================
           2. PURE MP4 TRANSPARENT VIDEO LAYER & ZOOM
           ========================================================================== */
        .curtain-video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 12;
            cursor: pointer;
            background: transparent; 
            transition: opacity 0.8s ease 0.4s, visibility 0.8s ease 0.4s;
        }

        #bgVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            
            /* KUNCI ZOOM: Melakukan perbesaran video sebesar 115% */
            transform: scale(1.15); 
            transform-origin: center center;
        }

        /* Petunjuk Teks Klik (Warna kembali ke Emas Mewah karena video sudah transparan) */
        .click-prompt {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 14;
            color: #ffd700; 
            text-align: center;
            pointer-events: none;
            transition: opacity 0.4s ease;
            animation: bounce 2s infinite ease-in-out;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        /* Efek Menghilang Setelah Video Selesai Diputar */
        .curtain-video-container.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .curtain-video-container.fade-out .click-prompt {
            opacity: 0 !important;
        }

        /* ==========================================================================
           3. CELESTIAL CONTENT LAYER
           ========================================================================== */
        .content-layer {
            width: 100%;
            height: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            background-color: #fdfaf2;
            background-image: radial-gradient(rgba(0,0,0,0.02) 1px, transparent 0);
            background-size: 4px 4px;
            position: relative;
            
            opacity: 0;
            transform: scale(0.96);
            transition: opacity 1.2s ease 0.1s, transform 1.2s ease 0.1s;
        }

        /* Muncul ketika gorden memudar */
        .curtain-video-container.fade-out + .content-layer {
            opacity: 1;
            transform: scale(1);
        }

        /* Ornamen Bingkai Samping Gorden */
        .side-drape-mock {
            position: absolute;
            top: 0;
            width: 40px;
            height: 100%;
            background: linear-gradient(90deg, #8b1e1e, #5a0f0f);
            opacity: 0.9;
            z-index: 1;
        }
        .side-drape-left { left: 0; border-radius: 0 15px 15px 0; box-shadow: 2px 0 10px rgba(0,0,0,0.15); }
        .side-drape-right { right: 0; border-radius: 15px 0 0 15px; box-shadow: -2px 0 10px rgba(0,0,0,0.15); }

        /* Graphics, Text & Chalices */
        .celestial-graphics { margin-top: 100px; position: relative; width: 200px; height: 160px; z-index: 2; }
        .celestial-svg { width: 100%; height: 100%; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1)); }
        .text-section { z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; }
        .main-invite { font-family: 'Great Vibes', cursive; font-size: 3.2rem; color: #1a237e; font-weight: bold; margin-bottom: 5px; transform: rotate(-1deg); }
        .star-divider { color: #e5a93b; font-size: 1.5rem; margin: 5px 0; animation: twinkle 3s infinite ease-in-out; }
        .description-text { font-family: 'Pinyon Script', cursive; font-size: 2.2rem; color: #0d1b2a; line-height: 1.2; max-width: 320px; font-weight: 600; }
        .rsvp-section { font-family: 'Great Vibes', cursive; font-size: 2.3rem; color: #1a237e; font-weight: bold; margin-top: 15px; }
        .chalice-container { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-between; padding: 0 45px; z-index: 2; }
        .chalice { width: 75px; height: 90px; filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.15)); }
        .chalice-left { transform: rotate(-15deg); }
        .chalice-right { transform: rotate(15deg); }

        @keyframes bounce { 0%, 100% { transform: translate(-50%, -45%); opacity: 0.8; } 50% { transform: translate(-50%, -55%); opacity: 1; } }
        @keyframes twinkle { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
    </style>
</head>
<body>

    <div class="card-container">
        
        <div class="curtain-video-container" id="curtainVideoWrapper" onclick="startCurtainVideo()">
            <video id="bgVideo" playsinline muted>
                <source src="tirai-buka.mp4" type="video/mp4">
                Browser kamu tidak mendukung tag video.
            </video>
            
            <div class="click-prompt" id="promptText">
                <p style="font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 4px; margin-bottom: 5px;">TAP TO OPEN</p>
                <span style="font-size: 1.8rem;">✦</span>
            </div>
        </div>

        <div class="content-layer">
            <div class="side-drape-mock side-drape-left"></div>
            <div class="side-drape-mock side-drape-right"></div>

            <div class="celestial-graphics">
                <svg class="celestial-svg" viewBox="0 0 200 160" xmlns="http://www.w3
