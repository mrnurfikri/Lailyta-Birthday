<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magical Invitation</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Pinyon_Script&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           1. RESET & BASE LAYOUT
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0b0a; /* Latar belakang luar gelap agar fokus ke kartu */
            font-family: 'Cinzel', serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CONTAINER UTAMA (Rasio kartu undangan digital) */
        .card-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 800px;
            background: #fdfaf2;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #ebdcb9;
        }

        /* ==========================================================================
           2. INTERACTIVE HERO: THE CURTAIN (TIRAI MERAH)
           ========================================================================== */
        .curtain-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: pointer;
            display: flex;
            overflow: hidden;
        }

        /* Efek Tekstur Tirai Beludru Merah */
        .curtain-panel {
            position: absolute;
            top: 0;
            width: 51%; /* Sedikit overlap di tengah agar tidak bocor */
            height: 100%;
            background: linear-gradient(90deg, #6e1313, #b83232 25%, #d64545 50%, #b83232 75%, #5a0f0f);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.7);
            transition: transform 2s cubic-bezier(0.66, 0, 0.2, 1);
            filter: contrast(1.1) saturate(1.1);
            z-index: 12;
        }

        .curtain-left {
            left: 0;
            transform-origin: left center;
            border-right: 1px solid #4a0a0a;
        }

        .curtain-right {
            right: 0;
            transform-origin: right center;
            border-left: 1px solid #4a0a0a;
        }

        /* Tirai Lengkung Permanen Atas */
        .curtain-top-valance {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 140px;
            background: radial-gradient(ellipse at top, #d64545, #6e1313 80%);
            border-bottom: 3px solid #5a0f0f;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-radius: 0 0 50% 50% / 0 0 25px 25px;
            z-index: 13;
            transition: transform 1.5s ease-in-out;
        }

        /* Petunjuk Klik Tirai */
        .click-prompt {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 14;
            color: #ffd700;
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s ease;
            animation: bounce 2s infinite ease-in-out;
        }

        /* ANIMASI KETIKA TIRAI DIBUKA */
        .curtain-wrapper.opened .curtain-left {
            transform: translateX(-100%) scaleX(0.2); /* Menyusut ke kiri */
        }
        .curtain-wrapper.opened .curtain-right {
            transform: translateX(100%) scaleX(0.2); /* Menyusut ke kanan */
        }
        .curtain-wrapper.opened .curtain-top-valance {
            transform: translateY(-20px); /* Sedikit naik untuk membuka ruang */
        }
        .curtain-wrapper.opened .click-prompt {
            opacity: 0;
        }

        /* ==========================================================================
           3. CELESTIAL CONTENT LAYER (TERSEMBUNYI DI AWAL)
           ========================================================================== */
        .content-layer {
            width: 100%;
            height: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            background-color: #fdfaf2;
            background-image: radial-gradient(rgba(0,0,0,0.02) 1px, transparent 0);
            background-size: 4px 4px;
            position: relative;
            
            /* KUNCI PERUBAHAN: Sembunyikan total sebelum diklik */
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 2s ease 0.5s, transform 2s ease 0.5s; /* Muncul perlahan dengan delay mendebarkan */
        }

        /* Munculkan konten saat tirai diberi kelas 'opened' */
        .curtain-wrapper.opened + .content-layer {
            opacity: 1;
            transform: scale(1);
        }

        /* Bingkai Tirai Dekoratif Samping di Dalam */
        .side-drape-mock {
            position: absolute;
            top: 0;
            width: 40px;
            height: 100%;
            background: linear-gradient(90deg, #8b1e1e, #5a0f0f);
            opacity: 0.9;
            z-index: 1;
        }
        .side-drape-left { left: 0; border-radius: 0 15px 15px 0; box-shadow: 2px 0 10px rgba(0,0,0,0.15); }
        .side-drape-right { right: 0; border-radius: 15px 0 0 15px; box-shadow: -2px 0 10px rgba(0,0,0,0.15); }

        /* --- ELEMEN GRAFIS ELESTIAL --- */
        .celestial-graphics {
            margin-top: 100px;
            position: relative;
            width: 200px;
            height: 160px;
            z-index: 2;
        }

        .celestial-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
        }

        /* --- TEKS UNDANGAN --- */
        .text-section {
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .main-invite {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            color: #1a237e;
            font-weight: bold;
            margin-bottom: 5px;
            transform: rotate(-1deg);
        }

        .star-divider {
            color: #e5a93b;
            font-size: 1.5rem;
            margin: 5px 0;
            animation: twinkle 3s infinite ease-in-out;
        }

        .description-text {
            font-family: 'Pinyon Script', cursive;
            font-size: 2.2rem;
            color: #0d1b2a;
            line-height: 1.2;
            max-width: 320px;
            font-weight: 600;
        }

        .rsvp-section {
            font-family: 'Great Vibes', cursive;
            font-size: 2.3rem;
            color: #1a237e;
            font-weight: bold;
            margin-top: 15px;
        }

        /* --- PIALA MEDIEVAL (CHALICES) --- */
        .chalice-container {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 45px;
            z-index: 2;
        }

        .chalice {
            width: 75px;
            height: 90px;
            filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.15));
        }
        
        .chalice-left { transform: rotate(-15deg); }
        .chalice-right { transform: rotate(15deg); }

        /* ==========================================================================
           4. ANIMASI UTAS
           ========================================================================== */
        @keyframes bounce {
            0%, 100 prompt { transform: translate(-50%, -45%); opacity: 0.8; }
            50% { transform: translate(-50%, -55%); opacity: 1; }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.5; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="card-container">
        
        <div class="curtain-wrapper" id="curtainBtn" onclick="toggleCurtain()">
            <div class="curtain-top-valance"></div>
            <div class="curtain-panel curtain-left"></div>
            <div class="curtain-panel curtain-right"></div>
            <div class="click-prompt">
                <p style="font-family: 'Cinzel'; font-size: 0.75rem; letter-spacing: 4px; margin-bottom: 5px;">TAP TO OPEN</p>
                <span style="font-size: 1.8rem;">✦</span>
            </div>
        </div>

        <div class="content-layer">
            
            <div class="side-drape-mock side-drape-left"></div>
            <div class="side-drape-mock side-drape-right"></div>

            <div class="celestial-graphics">
                <svg class="celestial-svg" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
                    <text x="35" y="30" fill="#e5a93b" font-size="12">★</text>
                    <text x="165" y="25" fill="#e5a93b" font-size="10">★</text>
                    <text x="100" y="20" fill="#e5a93b" font-size="14">★</text>
                    <text x="20" y="90" fill="#e5a93b" font-size="10">★</text>
                    <text x="180" y="95" fill="#e5a93b" font-size="12">★</text>
                    
                    <g transform="translate(90, 65)">
                        <path d="M0,-45 L5,-25 L20,-35 L10,-15 L35,-20 L15,0 L45,0 L15,10 L35,25 L10,15 L20,38 L5,25 L0,45 L-5,25 L-20,38 L-10,15 L-35,25 L-15,10 L-45,0 L-15,0 L-35,-20 L-10,-15 L-20,-35 L-5,-25 Z" fill="#fca311" stroke="#d47a00" stroke-width="1.5" stroke-linejoin="round"/>
                        <circle cx="0" cy="0" r="23" fill="#ffcc00" stroke="#d47a00" stroke-width="1.5"/>
                        <path d="M-12,-4 C-8,-8 -4,-4 -4,-4 M4,-4 C4,-4 8,-8 12,-4" stroke="#5c3a00" stroke-width="1.5" fill="none"/>
                        <circle cx="-8" cy="2" r="3" fill="#ff7043" opacity="0.6"/>
                        <circle cx="8" cy="2" r="3" fill="#ff7043" opacity="0.6"/>
                        <path d="M-4,6 Q0,10 4,6" stroke="#b22222" stroke-width="2" fill="none"/>
                    </g>

                    <g transform="translate(115, 80)">
                        <path d="M 10,-30 A 30,30 0 1,0 40,20 A 24,24 0 1,1 10,-30 Z" fill="#64b5f6" stroke="#1565c0" stroke-width="1.5"/>
                        <path d="M18,-5 Q20,-8 22,-5" stroke="#0d47a1" stroke-width="1" fill="none"/>
                        <circle cx="20" cy="2" r="2.5" fill="#ff5252" opacity="0.7"/>
                        <path d="M16,5 Q20,7 21,4" stroke="#b22222" stroke-width="1.5" fill="none"/>
                    </g>
                </svg>
            </div>

            <div class="text-section">
                <h1 class="main-invite">You're Invited</h1>
                <div class="star-divider">✦</div>
                <p class="description-text">
                    To a magical evening of dancing, drinks, and merriment!
                </p>
                <div class="star-divider">✦</div>
                <p class="rsvp-section">RSVP to Julia<br>by August 2nd</p>
            </div>

            <div class="chalice-container">
                <svg class="chalice chalice-left" viewBox="0 0 60 80">
                    <path d="M10,10 C10,35 20,45 30,45 C40,45 50,35 50,10 Z" fill="#e5a93b" stroke="#ad7a18" stroke-width="1.5"/>
                    <rect x="26" y="45" width="8" height="20" fill="#e5a93b" stroke="#ad7a18" stroke-width="1.5"/>
                    <ellipse cx="30" cy="65" rx="15" ry="5" fill="#d49a2a" stroke="#ad7a18" stroke-width="1.5"/>
                    <circle cx="30" cy="25" r="4" fill="#d32f2f"/>
                    <path d="M5,12 C-5,-5 -8,15 -12,18 C-5,22 5,16 5,12 Z" fill="#b22222"/>
                </svg>

                <svg class="chalice chalice-right" viewBox="0 0 60 80">
                    <path d="M10,10 C10,35 20,45 30,45 C40,45 50,35 50,10 Z" fill="#e5a93b" stroke="#ad7a18" stroke-width="1.5"/>
                    <rect x="26" y="45" width="8" height="20" fill="#e5a93b" stroke="#ad7a18" stroke-width="1.5"/>
                    <ellipse cx="30" cy="65" rx="15" ry="5" fill="#d49a2a" stroke="#ad7a18" stroke-width="1.5"/>
                    <circle cx="30" cy="25" r="4" fill="#d32f2f"/>
                    <path d="M52,11 C58,-5 64,12 68,15 C62,22 52,18 52,11 Z" fill="#b22222"/>
                </svg>
            </div>

        </div>
    </div>

    <script>
        function toggleCurtain() {
            const curtain = document.getElementById('curtainBtn');
            
            // Memicu animasi tirai bergeser terbuka
            curtain.classList.add('opened');
            
            // Mematikan pointer event pada tirai agar user bisa menyalin atau berinteraksi dengan teks di bawahnya
            curtain.style.pointerEvents = 'none';
        }
    </script>
</body>
</html>
